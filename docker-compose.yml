version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledgebot-app
    # Using host network mode allows both containers to communicate via 'localhost'
    # seamlessly, which is required because the whatsapp-bridge code has localhost:3003 hardcoded.
    network_mode: "host"
    restart: always
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3003
      - HOSTNAME=0.0.0.0
      - WHATSAPP_BRIDGE_URL=http://localhost:3004
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  whatsapp-bridge:
    build:
      context: ./wa-server
      dockerfile: Dockerfile
    container_name: knowledgebot-wa-bridge
    network_mode: "host"
    restart: always
    volumes:
      - ./wwebjs_sessions:/data/wwebjs_sessions
      - ./wa-server/.wwebjs_cache:/app/.wwebjs_cache
    # Chrome needs system capabilities for sandboxing inside Docker
    cap_add:
      - SYS_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
