version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledgebot-app
    # Using host network mode allows both containers to communicate via 'localhost'
    # seamlessly, which is required because the whatsapp-bridge code has localhost:3003 hardcoded.
    network_mode: "host"
    restart: always
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3003
      - HOSTNAME=0.0.0.0

  whatsapp-bridge:
    build:
      context: ../wa-server-knowledge
      dockerfile: ../knowledgebot-saas/Dockerfile.whatsapp
    container_name: knowledgebot-wa-bridge
    network_mode: "host"
    restart: always
    volumes:
      - ../wa-server-knowledge/wwebjs_sessions:/data/wwebjs_sessions
      - ../wa-server-knowledge/.wwebjs_cache:/app/.wwebjs_cache
    # Chrome needs system capabilities for sandboxing inside Docker
    cap_add:
      - SYS_ADMIN
